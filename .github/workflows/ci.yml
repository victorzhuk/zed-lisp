name: CI

on:
  pull_request:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup default stable
      - run: rustup target add wasm32-wasip1
      - run: cargo fmt --check
      - run: cargo clippy --target wasm32-wasip1 -- -D warnings
      - run: cargo test
      - run: cargo build --release --target wasm32-wasip1
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-build
          path: target/wasm32-wasip1/release/zed_common_lisp.wasm

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: wasm-build
          path: wasm-build
      - run: |
          mv wasm-build/zed_common_lisp.wasm .
          tar czf zed-common-lisp-${{ github.ref_name }}.tar.gz \
            extension.toml \
            languages/ \
            README.md \
            LICENSE \
            zed_common_lisp.wasm
      - run: |
          gh release create ${{ github.ref_name }} \
            --title ${{ github.ref_name }} \
            --generate-notes || true
          gh release upload ${{ github.ref_name }} \
            zed-common-lisp-${{ github.ref_name }}.tar.gz \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

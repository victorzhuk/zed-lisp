name = "Common Lisp"
grammar = "commonlisp"
path_suffixes = ["lisp", "lsp", "cl", "asd"]
line_comments = ["; ", ";; ", ";;; "]
block_comment = ["#|", "|#"]
autoclose_before = ";:.,=}])>\""
tab_size = 2
hard_tabs = false
word_characters = ["-", "*", "+", "!", "?", "<", ">", "="]
completion_query_characters = ["-", "*", "+", "!", "?", "<", ">", "="]
collapsed_placeholder = "#| ... |#"

brackets = [
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["comment", "string"] },
    { start = "|", end = "|", close = true, newline = false, not_in = ["comment", "string"] },
]
